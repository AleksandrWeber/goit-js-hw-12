<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Search App</title>
  <script type="module" crossorigin src="/goit-js-hw-12/index.js"></script>
  <link rel="modulepreload" crossorigin href="/goit-js-hw-12/assets/vendor-DcHCnVjq.js">
  <link rel="stylesheet" crossorigin href="/goit-js-hw-12/assets/vendor-DumFYO8Z.css">
  <link rel="stylesheet" crossorigin href="/goit-js-hw-12/assets/index-BrVOYKR4.css">
</head>

<body>
  <main class="app">
    <section class="search-section">
      <h1 class="app-title">Image Search</h1>

      <form class="form" id="search-form">
        <label class="form-label">
          <input class="form-input" type="text" name="search-text" placeholder="Search images..." autocomplete="off"
            required />
        </label>
        <button class="form-button" type="submit">Search</button>
      </form>
    </section>

    <section class="gallery-section">
      <ul class="gallery"></ul>
    </section>

    <button class="load-more load-more-hidden" id="load-more-btn">Load More</button>

    <div class="loader loader-hidden" id="loader" aria-hidden="true"></div>
  </main>

</body>

</html>
